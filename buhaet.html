<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НКС БУХАЕТ|North Collective Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x1512" href="favicon/android-chrome-512x512.png">
    <link class="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        
        body {
            background: radial-gradient(circle at center, #2600ff 0%, #000000 80%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            font-family: "Courier New", Courier, monospace;
            animation: fadeInPage 1.2s ease-in-out;
        }

        .project-container {
            display: flex;
            max-width: 1100px; 
            margin: 80px auto;
            padding: 0 40px;
            justify-content: center;
            align-items: center;
        }

        .project-image-side {
            width: 100%;
            max-width: 950px; 
            position: relative;
        }

        .project-image-side img {
            width: 100%;
            border: 1px solid #1a4d80;
            border-radius: 4px; 
            display: block;
            animation: pulseStretch 2s infinite ease-in-out;
            transform-origin: center center;
            will-change: transform, box-shadow;
        }
       
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand-zone">
            <a href="index.html"><img src="img/logo.png" alt="Логотип НКС"></a>
        </div>

        <nav class="nav-zone">
            <a href="index.html" class="nav-button">
                <img src="img/home_button.png" alt="Главная страница" class="static">
                <img src="img/home_buttonACT.png" alt="Главная страница(наводка хых)" class="active">
            </a>
            
            <a href="about.html" class="nav-button">
                <img src="img/about_button.png" alt="О нас" class="static">
                <img src="img/about_buttonACT.png" alt="О нас(наводка хых)" class="active">
            </a>

            <a href="staff.html" class="nav-button nav-link">
                <img src="img/staff_button.png" alt="Персонал" class="static">
                <img src="img/staff_buttonACT.png" alt="Персонал(наводка хых)" class="active"> 
            </a>
        </nav>
    </header>

    <main class="project-container">
        <section class="project-image-side">
            <img src="img/БУХАЕМ.png" alt="Прыгающее изображение">
            
            <audio id="danceAudio" loop autoplay>
                <source src="sound/БУХАЕМ.mp3" type="audio/mpeg">
                Ваш браузер не поддерживает встроенные аудио.
            </audio>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
