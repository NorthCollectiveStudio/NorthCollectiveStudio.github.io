<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НКС БУХАЕТ|North Collective Studio</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x1512" href="favicon/android-chrome-512x512.png">
    <link class="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {

            background: radial-gradient(circle at center, #2600ff 0%, #000000 80%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            font-family: "Courier New", Courier, monospace;
            animation: fadeInPage 1.2s ease-in-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-container {
            width: 100%;
            height: 80px; 
            background: url('img/topgradient.png') repeat-x;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            height: 100%;
            padding-left: 10px;
        }

        .brand-zone img {
            height: 90%; 
            display: block;
        }

        .nav-zone {
            display: flex;
            height: 100%;
            padding-right: 40px;
        }

        .nav-button {
            display: block;
            height: 100%;
            position: relative;
            width: 110px;
            cursor: pointer;
        }

        .nav-button img {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: block;
            transition: opacity 0.4s ease-in-out;
        }

        .nav-button img.static { opacity: 1; z-index: 2; }
        .nav-button img.active { opacity: 0; z-index: 1; }

        .nav-button:hover img.static { opacity: 0; }
        .nav-button:hover img.active { opacity: 1; }


        .project-container {
            display: flex;
            max-width: 1100px; 
            margin: 80px auto;
            padding: 0 40px;
            justify-content: center;
            align-items: center;
        }


        .project-image-side {
            width: 100%;
            max-width: 950px; 
            position: relative;
        }

        .project-image-side video {
            width: 100%;
            border: 1px solid #1a4d80;
            border-radius: 4px; 
            display: block;
            animation: pulseStretch 2s infinite ease-in-out;
            transform-origin: center center;
            will-change: transform, box-shadow;
        }

        @keyframes pulseStretch {
            0% {
                transform: scale(1, 1);
                box-shadow: 0 0 15px rgba(0, 102, 255, 0.2);
            }
            25% {
                transform: scale(1.15, 0.90);
                box-shadow: 0 0 40px rgba(0, 102, 255, 0.7);
            }
            50% {
                transform: scale(1.05, 1.05);
                box-shadow: 0 0 25px rgba(0, 102, 255, 0.4);
            }
            75% {
                transform: scale(0.90, 1.15);
                box-shadow: 0 0 40px rgba(0, 102, 255, 0.7);
            }
            100% {
                transform: scale(1, 1);
                box-shadow: 0 0 15px rgba(0, 102, 255, 0.2);
            }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand-zone">
            <a href="index.html"><img src="img/logo.png" alt="Логотип НКС"></a>
        </div>

        <nav class="nav-zone">
            <a href="index.html" class="nav-button">
                <img src="img/home_button.png" alt="Главная страница" class="static">
                <img src="img/home_buttonACT.png" alt="Главная страница(наводка хых)" class="active">
            </a>
            
            <a href="about.html" class="nav-button">
                <img src="img/about_button.png" alt="О нас" class="static">
                <img src="img/about_buttonACT.png" alt="О нас(наводка хых)" class="active">
            </a>

            <a href="staff.html" class="nav-button nav-link">
                <img src="img/staff_button.png" alt="Персонал" class="static">
                <img src="img/staff_buttonACT.png" alt="Персонал(наводка хых)" class="active"> 
            </a>
        </nav>
    </header>

    <main class="project-container">
        <section class="project-image-side">
            <video id="danceVideo" controls loop autoplay playsinline>
                <source src="media/IMG_6851.mp4" type="video/mp4">
                Ваш браузер не поддерживает встроенные видео.
            </video>
        </section>
    </main>

    <script>
        const video = document.getElementById('danceVideo');
        

        document.addEventListener('click', function() {
            if (video.paused) {
                video.play().catch(function(error) {
                    console.log("Автоплей всё ещё заблокирован: " + error);
                });
            }
        }, { once: true });
    </script>

</body>
</html>
