<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Collective Studio</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0813;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff5e62, #ff9966);
            border-radius: 4px;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #1a0f26 0%, #07050f 70%, #000000 100%);
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
            font-family: "Courier New", Courier, monospace;     
            animation: fadeInPage 1.2s ease-in-out;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-container {
            width: 100%;
            height: 80px; 
            background: url('img/topgradient.png') repeat-x;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            height: 100%;
            padding-left: 10px;
        }

        .brand-zone img {
            height: 90%; 
            display: block;
            filter: drop-shadow(0 0 8px rgba(255, 153, 102, 0.3));
        }

        .nav-zone {
            display: flex;
            height: 100%;
            padding-right: 20px; 
        }

        .nav-button {
            display: block;
            height: 100%;
            position: relative;
            width: 110px;
            transition: transform 0.2s ease;
        }

        .nav-button:hover {
            transform: translateY(-2px);
        }

        .nav-button img {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: block;
        }

        .nav-link { cursor: pointer; }
        .nav-link img { transition: opacity 0.4s ease-in-out; }
        .nav-link img.static { opacity: 1; z-index: 2; }
        .nav-link img.active { opacity: 0; z-index: 1; }
        .nav-link:hover img.static { opacity: 0; }
        .nav-link:hover img.active { opacity: 1; }

        .nav-static { cursor: default; }
        .nav-static img { opacity: 1; z-index: 2; }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            position: relative; 
            max-width: 1200px; 
            margin: 0 auto;
            width: 100%;
        }

        .main-statue {
            width: 300px;
            max-width: 80%;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 25px rgba(255, 94, 98, 0.35));
            animation: floatMain 4s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes floatMain {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hero-title {
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff9966, #ff5e62);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-size: 14px;
            color: #bfaecf;
            max-width: 600px;
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        .hero-mascot {
            position: absolute;
            height: auto;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(255, 94, 98, 0.2));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            will-change: transform, opacity;
        }

        .hero-mascot:hover {
            transform: scale(1.15) rotate(3deg) !important; 
            z-index: 3;
        }

        @keyframes mascotFadeInUp1 {
            0% { opacity: 0; transform: translateY(40px) rotate(-10deg); }
            100% { opacity: 1; transform: translateY(0px) rotate(-4deg); }
        }
        @keyframes mascotFadeInUp2 {
            0% { opacity: 0; transform: translateY(40px) rotate(10deg); }
            100% { opacity: 1; transform: translateY(0px) rotate(4deg); }
        }
        @keyframes mascotFadeInUp3 {
            0% { opacity: 0; transform: translateX(-40px) translateY(20px) rotate(-5deg); }
            100% { opacity: 1; transform: translateX(0px) translateY(0px) rotate(0deg); }
        }
        @keyframes mascotFadeInUp4 {
            0% { opacity: 0; transform: translateX(40px) translateY(20px) rotate(5deg); }
            100% { opacity: 1; transform: translateX(0px) translateY(0px) rotate(0deg); }
        }

        @keyframes floatMascot1 {
            0%, 100% { transform: translateY(0px) rotate(-4deg); }
            50% { transform: translateY(-12px) rotate(0deg); }
        }
        @keyframes floatMascot2 {
            0%, 100% { transform: translateY(0px) rotate(4deg); }
            50% { transform: translateY(-10px) rotate(0deg); }
        }
        @keyframes floatMascot3 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        @keyframes floatMascot4 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-9px) rotate(-3deg); }
        }

        .mascot-insom {
            width: 100px;
            top: 20px;
            left: 15%;
            animation: mascotFadeInUp1 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards, 
                       floatMascot1 3.8s ease-in-out infinite 1.5s;
        }

        .mascot-tanya {
            width: 110px;
            top: 15px;
            right: 15%;
            animation: mascotFadeInUp2 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards, 
                       floatMascot2 4.2s ease-in-out infinite 1.7s;
        }

        .mascot-cat {
            width: 120px;
            top: 50%;
            transform: translateY(-50%);
            left: 4%;
            animation: mascotFadeInUp3 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.7s forwards, 
                       floatMascot3 4.0s ease-in-out infinite 1.9s;
        }

        .mascot-rosem {
            width: 125px;
            top: 50%;
            transform: translateY(-50%);
            right: 4%;
            animation: mascotFadeInUp4 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.9s forwards, 
                       floatMascot4 4.5s ease-in-out infinite 2.1s;
        }

        .main-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1; 
        }

        .external-card {
            text-decoration: none;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #0a0a0a;
        }

        .external-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(255, 94, 98, 0.15) 100%);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .external-card img {
            display: block;
            width: 320px; 
            height: auto;
            transition: filter 0.3s, transform 0.6s;
        }

        .external-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 153, 102, 0.4);
            box-shadow: 0 10px 25px rgba(255, 94, 98, 0.2);
        }

        .external-card:hover img {
            transform: scale(1.05); 
            filter: brightness(1.1) saturate(1.1);
        }

        footer {
            padding: 40px 20px;
            border-top: 1px solid rgba(255, 94, 98, 0.15);
            text-align: center;
            background-color: #000;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .social-link {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: #ff9966;
            text-shadow: 0 0 10px rgba(255, 153, 102, 0.4);
        }

        .copyright {
            font-size: 10px;
            color: #635673;
            letter-spacing: 1px;
        }

        @media (max-width: 1024px) {
            .mascot-insom { left: 8%; }
            .mascot-tanya { right: 8%; }
            .mascot-cat { left: 2%; width: 90px; }
            .mascot-rosem { right: 2%; width: 95px; }
        }

        /* --- ОБНОВЛЕННЫЙ МОБИЛЬНЫЙ МЕДИА-ЗАПРОС --- */
        @media (max-width: 768px) {
            .header-container { height: 60px; }
            .nav-button { width: 80px; }
            
            .hero-title { font-size: 18px; letter-spacing: 2px; }
            .hero-subtitle { font-size: 12px; }
            .main-statue { width: 190px; }

            /* Возвращаем абсолютное позиционирование и левитацию на смартфонах */
            .hero-mascot {
                position: absolute;
                display: block;
                opacity: 0; /* Оставляем анимацию плавного появления */
            }

            /* Компактно ужимаем координаты вокруг уменьшенной статуи */
            .mascot-insom {
                width: 65px !important;
                top: 10px !important;
                left: 5% !important;
            }

            .mascot-tanya {
                width: 75px !important;
                top: 5px !important;
                right: 5% !important;
            }

            .mascot-cat {
                width: 75px !important;
                top: 42% !important;
                left: 2% !important;
                transform: translateY(-50%) !important;
            }

            .mascot-rosem {
                width: 80px !important;
                top: 42% !important;
                right: 2% !important;
                transform: translateY(-50%) !important;
            }
            
            .hero-section {
                padding: 40px 10px;
            }

            .external-card img {
                width: 100%; 
                max-width: 400px;
            }

            .footer-socials {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
