<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Collective Studio</title>
    <style>
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            font-family: "Courier New", Courier, monospace;     
            animation: fadeInPage 1.2s ease-in-out;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        
        .header-container {
            width: 100%;
            height: 80px; 
            background: url('img/topgradient.png') repeat-x;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            height: 100%;
            padding-left: 10px;
        }

        .brand-zone img {
            height: 90%; 
            display: block;
        }

        .nav-zone {
            display: flex;
            height: 100%;
            padding-right: 20px; 
        }

        .nav-button {
            display: block;
            height: 100%;
            position: relative;
            width: 110px;
        }

        .nav-button img {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: block;
        }

        .nav-link { cursor: pointer; }
        .nav-link img { transition: opacity 0.4s ease-in-out; }
        .nav-link img.static { opacity: 1; z-index: 2; }
        .nav-link img.active { opacity: 0; z-index: 1; }
        .nav-link:hover img.static { opacity: 0; }
        .nav-link:hover img.active { opacity: 1; }

        .nav-static { cursor: default; }
        .nav-static img { opacity: 1; z-index: 2; }

        
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
        }

        .main-statue {
            width: 300px;
            max-width: 80%;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.05));
        }

        .hero-title {
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .hero-subtitle {
            font-size: 14px;
            color: #aaa;
            max-width: 600px;
            line-height: 1.6;
        }

        
        .main-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1; 
        }

        .external-card {
            text-decoration: none;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #0a0a0a;
        }

        .external-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .external-card img {
            display: block;
            width: 320px; 
            height: auto;
            transition: filter 0.3s, transform 0.6s;
        }

        .external-card:hover {
            transform: translateY(-8px);
            border-color: #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .external-card:hover img {
            transform: scale(1.05); 
            filter: brightness(1.1);
        }

        
        footer {
            padding: 40px 20px;
            border-top: 1px solid #222;
            text-align: center;
            background-color: #000;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .social-link {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: #aaa;
        }

        .copyright {
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
        }

        
        @media (max-width: 768px) {
            .header-container { height: 60px; }
            .nav-button { width: 80px; }
            
            .hero-title { font-size: 18px; letter-spacing: 2px; }
            .hero-subtitle { font-size: 12px; }
            .main-statue { width: 200px; }

            .external-card img {
                width: 100%; 
                max-width: 400px;
            }

            .footer-socials {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand-zone">
            <img src="img/logo.png" alt="Логотип НКС">
        </div>

        <nav class="nav-zone">
            <div class="nav-button nav-static">
                <img src="img/home_buttonACT.png" alt="Главная страница">
            </div>
            
            <a href="about.html" class="nav-button nav-link">
                <img src="img/about_button.png" alt="О нас" class="static">
                <img src="img/about_buttonACT.png" alt="О нас(наводка хых)" class="active">
            </a>
        </nav>
    </header>

    <section class="hero-section">
        <img src="img/logo big.jpg" alt="Statue" class="main-statue">
        
        <h1 class="hero-title">Welcome to [North Collective Studio]</h1>
        <p class="hero-subtitle">
            Фотографии, эдиты, дубляж, музыка, веб сериалы и много другого стаффа!
        </p>
    </section>

    <main class="main-grid">
        <a href="projectkant.html" target="_blank" class="external-card">
            <img src="projects/projectkant/logo.png" alt="Карточка Проекта 1">
        </a>
        <a href="rosemfield.html" target="_blank" class="external-card">
            <img src="projects/rf/logomain.png" alt="Карточка Проекта 2">
        </a>
        <a href="comingsoon.html" target="_blank" class="external-card">
            <img src="img/comingsoon.png" alt="Карточка Проекта 3">
        </a>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://t.me/NORTHCOLLECTIVECH" class="social-link">Telegram</a>
            <a href="https://www.youtube.com/@NORTHCOLLECTIVESTUDIO" class="social-link">YouTube</a>
            <a href="https://www.tiktok.com/@NORTHCOLLECTIVESTUDIO" class="social-link">Tiktok</a>
            <a href="https://rosemguy.github.io/RDwebsite/" class="social-link">Made By RosemaryDude</a>
        </div>
        <p class="copyright">© 2026 NORTH COLLECTIVE STUDIO. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
