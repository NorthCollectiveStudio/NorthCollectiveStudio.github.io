<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCS TV MANAGER</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x1512" href="favicon/android-chrome-512x512.png">
    <link class="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }


        .tv-container {
            position: relative;
            width: 550px;
            height: 550px;
            cursor: pointer;
            user-select: none;
        }


        .tv-hardware {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/tv.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
        }


        .tv-screen-area {
            position: absolute;
            top: 17.5%;     
            left: 15.6%;    
            width: 68.6%;   
            height: 51.0%;  
            background-color: #050505; 
            overflow: hidden;
            z-index: 5;
            border-radius: 35px / 18px;
            clip-path: inset(0% 0% 0% 0% round 35px / 18px); 
        }


        .screen-content {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #ffffff; 
            opacity: 0;
            filter: brightness(0.85) contrast(1.15); 
            transition: opacity 0.3s ease-in-out;
            position: relative;
            z-index: 6;
        }


        .active .screen-content.show-pic {
            opacity: 1;
        }




        .tv-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;

            background-image: repeating-radial-gradient(rgba(0,0,0,0.8) 0px, rgba(200,200,200,0.2) 1px, rgba(0,0,0,0.7) 2px);
            background-size: 150px 150px;
            opacity: 0; 
            z-index: 7;
            pointer-events: none;
        }


        .active .tv-noise {
            opacity: 0.18; 
            animation: noise-move 0.1s infinite;
        }


        .active.no-picture .tv-noise {
            opacity: 0.75;
            animation: noise-move 0.05s infinite;
            background-color: #111;
        }


        @keyframes noise-move {
            0% { background-position: 0px 0px; }
            20% { background-position: 50px 20px; }
            40% { background-position: -30px 40px; }
            60% { background-position: 10px -80px; }
            80% { background-position: -40px -10px; }
            100% { background-position: 30px 30px; }
        }


        .tv-screen-area::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }


        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 45%, rgba(0,0,0,0.75) 100%);
            animation: crt-flicker 0.15s infinite;
            z-index: 11;
            pointer-events: none;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.93; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }


        .prompt-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            text-shadow: 0 0 6px #ffffff;
            z-index: 8;
            animation: pulse 1.5s infinite;
            transition: opacity 0.2s ease-in-out, visibility 0.2s;
            visibility: visible;
        }

        .active .prompt-text {
            opacity: 0;
            visibility: hidden;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <audio id="tv-audio"></audio>

    <div class="tv-container" id="tv" onclick="toggleTV()">
        
        <div class="tv-hardware"></div>
        
        <div class="tv-screen-area">
            <div class="prompt-text">Press<br>to TV</div>
            
            <div class="tv-noise"></div>
            
            <div class="crt-overlay"></div>
            
            <div class="screen-content" id="screen-img"></div>
        </div>

    </div>

    <script>
        const tv = document.getElementById('tv');
        const audio = document.getElementById('tv-audio');
        const screenImg = document.getElementById('screen-img');


        let isFirstTime = true;


        const randomPlaylist = [
            { file: 'sound/track2.mp3', chance: 0.90, img: 'img/error_ntsc.png', showImg: true }, 
            { file: 'sound/track3.mp3', chance: 0.10, img: '', showImg: false } // Без картинки
        ];


        function getRandomEvent() {
            const roll = Math.random();
            let startRange = 0;

            for (let track of randomPlaylist) {
                if (roll >= startRange && roll < startRange + track.chance) {
                    return track;
                }
                startRange += track.chance;
            }
            return randomPlaylist[0];
        }

        function toggleTV() {

            tv.classList.toggle('active');
            

            tv.classList.remove('no-picture');
            screenImg.classList.remove('show-pic');

            if (tv.classList.contains('active')) {
                let currentTrack = "";
                let currentImg = "";
                let shouldShowImg = false;

                if (isFirstTime) {
                    // Железная логика на ПЕРВЫЙ запуск
                    currentTrack = 'sound/track1.mp3';
                    currentImg = 'img/r_prhwe2.png';
                    shouldShowImg = true;
                    isFirstTime = false; 
                    console.log("Первый запуск! Показываем r_prhwe2.png");
                } else {

                    const rolledEvent = getRandomEvent();
                    currentTrack = rolledEvent.file;
                    currentImg = rolledEvent.img;
                    shouldShowImg = rolledEvent.showImg;
                    
                    if (!shouldShowImg) {

                        tv.classList.add('no-picture');
                        console.log("Редкий запуск! Картинки нет, только белый шум.");
                    } else {
                        console.log("Обычный запуск! Показываем error_ntsc.png");
                    }
                }


                if (shouldShowImg) {
                    screenImg.style.backgroundImage = `url('${currentImg}')`;
                    screenImg.classList.add('show-pic');
                } else {
                    screenImg.style.backgroundImage = 'none';
                }

                audio.src = currentTrack;
                audio.play().catch(e => console.log("Браузер заблокировал аудио"));

            } else {

                turnOffTV();
            }
        }

        function turnOffTV() {
            tv.classList.remove('active');
            tv.classList.remove('no-picture');
            screenImg.classList.remove('show-pic');
            audio.pause();
            audio.src = "";
            screenImg.style.backgroundImage = 'none';
            console.log("Телевизор выключен.");
        }


        audio.addEventListener('ended', () => {
            console.log("Трек закончился. Автовыключение...");
            turnOffTV();
        });
    </script>
</body>
</html>
