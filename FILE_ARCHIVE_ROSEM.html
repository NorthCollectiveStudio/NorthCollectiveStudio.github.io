<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosemFlowers-Status:WATCH</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }


        .tv-frame {
            position: relative;
            width: 750px;
            height: 750px;
            background: url('img/rosask/tv.png') no-repeat center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .crt-screen {
            position: absolute;
            top: 11%;
            left: 11%;
            width: 78%;
            height: 61%;
            background: url('img/rosask/back.png') no-repeat center bottom;
            background-size: cover;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9);
            animation: crt-flicker 0.15s infinite;
        }


        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 5;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-prompt {
            font-family: 'Courier New', Courier, monospace;
            color: #33ff33; 
            font-size: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(51, 255, 51, 0.8);
            animation: pulse 1s infinite alternate;
        }


        .stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1;
        }

        .sprite {
            height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.7));
            transition: transform 0.1s ease-in-out;
        }


        .vn-ui-container {
            position: absolute;
            bottom: 90px;
            left: 25px;
            right: 25px;
            z-index: 3;
        }

        .name-box {
            display: inline-block;
            background: #0c0c0c;
            color: #ffffff;
            border: 2px solid #3a3a3a;
            border-bottom: none;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.5);
        }


        .textbox {
            background: rgba(13, 13, 13, 0.88);
            border: 2px solid #3a3a3a;
            border-radius: 0 5px 5px 5px;
            padding: 15px;
            min-height: 95px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            position: relative;
        }


        .text-content {
            font-size: 14px;
            line-height: 1.5;
            color: #e5e5e5;
            padding-right: 15px;
        }


        .next-arrow {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: #888;
            animation: arrow-blink 0.6s infinite alternate;
        }

        /* Анимации */
        @keyframes crt-flicker {
            0% { opacity: 0.993; }
            50% { opacity: 1; }
            100% { opacity: 0.996; }
        }

        @keyframes arrow-blink {
            0% { opacity: 0.2; transform: translateY(0); }
            100% { opacity: 1; transform: translateY(2px); }
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .crt-screen:active .sprite {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <audio id="bgm" src="sound/track2.mp3" loop></audio>

    <div class="tv-frame">
        <div class="crt-screen" id="game-box">
            
            <div class="start-overlay" id="start-screen">
                <div class="start-prompt">▶ НАЖМИ ДЛЯ ВКЛЮЧЕНИЯ</div>
            </div>
            
            <div class="stage">
                <img id="character" class="sprite" src="img/rosask/normal.png" alt="Персонаж">
            </div>

            <div class="vn-ui-container">
                <div class="name-box" id="char-name">???</div>
                <div class="textbox">
                    <div class="text-content">
                        <div id="dialogue">Загрузка...</div>
                    </div>
                    <div class="next-arrow">▼</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const facts = [
            {
                name: "Rosem",
                text: "Где я нахуй",
                sprite: "img/rosask/o_o.png"
            },
            {
                name: "Rosem",
                text: "Ладно раз уж я в своей комнате похуй",
                sprite: "img/rosask/normal.png"
            },
            {
                name: "Rosem",
                text: "Ого, я думаю что кто то сидит и смотрит на меня",
                sprite: "img/rosask/nevermind.png"
            },
            {
                name: "Rosem",
                text: "Так и есть бляя",
                sprite: "img/rosask/fuck.png"
            },
            {
                name: "Rosem",
                text: "Хочется как то вернуть старые временна",
                sprite: "img/rosask/sad.png"
            },
            {
                name: "Rosem",
                text: "Я только щас вспомнил что через несколько минут должна эта как там Хикки прийти",
                sprite: "img/rosask/nappy.png"
            },
            {
                name: "Rosem",
                text: "Я немного Хикки боюсь как то",
                sprite: "img/rosask/o_o.png"
            },
            {
                name: "Rosem",
                text: "надеюсь что реня не будет спать в это время",
                sprite: "img/rosask/o_o.png"
            },
            {
                name: "Rosem",
                text: "Бля почему мне мама не звонит почти что",
                sprite: "img/rosask/sad.png"
            },
            {
                name: "Rosem",
                text: "дингробесе",
                sprite: "img/rosask/normal.png"
            },
            {
                name: "Rosem",
                text: "Ну надеемся что я не усну до прихода Хикки",
                sprite: "img/rosask/normal.png"
            },
            {
                name: "Rosem",
                text: "Что ты любишь?",
                sprite: "img/rosask/nevermind.png"
            },
            {
                name: "Rosem",
                text: "Кстати должен скоро выйти кое что особое",
                sprite: "img/rosask/nappy.png"
            },
            {
                name: "Rosem",
                text: "как же я боюсь взрослеть",
                sprite: "img/rosask/sad.png"
            },
            {
                name: "Rosem",
                text: "простите простите простите простите простите простите простите простите простите простите простите простите простите",
                sprite: "img/rosask/sad.png"
            }
        ];

        let lastIndex = -1;
        let isStarted = false; 

        const gameBox = document.getElementById('game-box');
        const startScreen = document.getElementById('start-screen');
        const characterImg = document.getElementById('character');
        const dialogueText = document.getElementById('dialogue');
        const nameTag = document.getElementById('char-name');
        const bgm = document.getElementById('bgm');

        function getRandomFact() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * facts.length);
            } while (randomIndex === lastIndex && facts.length > 1);

            lastIndex = randomIndex;
            return facts[randomIndex];
        }

        function nextFact() {
            const fact = getRandomFact();
            dialogueText.textContent = fact.text;
            characterImg.src = fact.sprite;
            nameTag.textContent = fact.name || "???";
        }


        gameBox.addEventListener('click', () => {
            if (!isStarted) {
                
                isStarted = true;
                startScreen.style.display = 'none'; 
                
                
                bgm.play().catch(error => {
                    console.log("Автовоспроизведение музыки заблокировано браузером. Потребуется еще клик.", error);
                });
// Показываем первую реплику Розема
                nextFact(); 
            } else {

                nextFact();
            }
        });
    </script>

</body>
</html>
