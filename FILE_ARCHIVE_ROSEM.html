<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosemFlowers-Status:WATCH</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        @media (min-width: 768px) {
        .crt-screen { border-radius: 18px; }
        .vn-ui-container { bottom: 90px; left: 25px; right: 25px; }
            
        .name-box { 
            font-size: 12px; 
            padding: 4px 12px; 
        }

        .textbox { 
            padding: 10px 14px; 
            min-height: 64px; /* Оптимальная высота для больших экранов */
        }

        .text-content { 
            font-size: 12px; 
        }

        .start-prompt { 
            font-size: 13px; 
        }
    }
    </style>
</head>
<body>

    <audio id="bgm" src="sound/track2.mp3" loop></audio>

    <div class="tv-frame">
        <div class="crt-screen" id="game-box">
            
            <div class="start-overlay" id="start-screen">
                <div class="start-prompt">▶ НАЖМИ ДЛЯ ВКЛЮЧЕНИЯ</div>
            </div>
            
            <div class="stage">
                <img id="character" class="sprite" src="img/rosask/normal.png" alt="Персонаж">
            </div>

            <div class="vn-ui-container">
                <div class="name-box" id="char-name">???</div>
                <div class="textbox">
                    <div class="text-content">
                        <div id="dialogue">Загрузка...</div>
                    </div>
                    <div class="next-arrow">▼</div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js" defer></script>

</body>
</html>
